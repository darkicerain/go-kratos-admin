networks:
  app-tier:
    driver: bridge

services:
  postgres:
    image: docker.io/bitnami/postgresql:latest
    restart: always
    ports:
      - "5432:5432"
    networks:
      - app-tier
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=*Abcd123456
      - POSTGRES_DB=gwa

#  mysql:
#    image: docker.io/bitnami/mariadb:latest
#    restart: always
#    ports:
#      - "3306:3306"
#    networks:
#      - app-tier
#    environment:
#      - MARIADB_ROOT_PASSWORD=*Abcd123456
#      - MARIADB_USER=admin
#      - MARIADB_PASSWORD=*Abcd123456
#      - MARIADB_DATABASE=gwa
#      - ALLOW_EMPTY_PASSWORD=yes
#      - TZ=Asia/Shanghai

  redis:
    image: docker.io/bitnami/redis:latest
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-tier
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - REDIS_PASSWORD=*Abcd123456
      - REDIS_AOF_ENABLED=no
      - REDIS_IO_THREADS_DO_READS=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL,CONFIG
#    volumes:
#      - /${APP_ROOT:-/root/app}/redis/data:/bitnami/redis/data

  minio:
    image: docker.io/minio/minio:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app-tier
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=*Abcd123456
      - MINIO_DEFAULT_BUCKETS=images
      - MINIO_FORCE_NEW_KEYS=yes
      - BITNAMI_DEBUG=true
#    volumes:
#      - ${APP_ROOT:-/root/app}/minio/data:/data
    command: server /data --console-address ':9001'

#  jaeger:
#    image: docker.io/jaegertracing/all-in-one:latest
#    restart: always
#    ports:
#      - "6831:6831/udp"
#      - "5778:5778"
#      - "4317:4317"
#      - "4318:4318"
#      - "16686:16686"
#      - "14250:14250"
#      - "14268:14268"
#      - "14269:14269"
#    networks:
#      - app-tier
#    environment:
#      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
#      - COLLECTOR_OTLP_ENABLED=true

  admin-service:
    image: go-wind-admin/admin-service
    restart: always
    pull_policy: never
    networks:
      - app-tier
    ports:
      - "7788:7788"
      - "7789:7789"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      - TZ=Asia/Shanghai
    build:
      context: ./  # 指定 Dockerfile 所在的上下文路径
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin
        APP_VERSION: 1.0.0
